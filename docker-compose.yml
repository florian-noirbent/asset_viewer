services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gocanopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gocanopy}
      POSTGRES_DB: ${POSTGRES_DB:-gocanopy}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gocanopy} -d ${POSTGRES_DB:-gocanopy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-assets}
    entrypoint: >
      /bin/sh -c '
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}";
        mc mb --ignore-existing "local/$${MINIO_BUCKET}";
      '

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gocanopy:gocanopy@postgres:5432/gocanopy}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-assets}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_PRESIGNED_URL_EXPIRES_SECONDS: ${MINIO_PRESIGNED_URL_EXPIRES_SECONDS:-900}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
      GOCANOPY_SKIP_STARTUP: ${GOCANOPY_SKIP_STARTUP:-false}
      GOCANOPY_OTEL_ENABLED: ${GOCANOPY_OTEL_ENABLED:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ressources:/app/ressources:ro
    depends_on:
      backend-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: uv run --no-dev uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  backend-migrate:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gocanopy:gocanopy@postgres:5432/gocanopy}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run --no-dev alembic upgrade head

  backend-init:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://gocanopy:gocanopy@postgres:5432/gocanopy}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-assets}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    volumes:
      - ./backend:/app
      - ./ressources:/app/ressources:ro
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    command: uv run --no-dev python -m app.db.init_from_json

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  minio_data:
  frontend_node_modules:
