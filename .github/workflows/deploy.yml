name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy on Runner Host
    runs-on: [self-hosted, rserver]
    if: ${{ github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'develop') }}
    outputs:
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Determine environment and image tags
        id: env
        run: |
          BRANCH=${{ github.event.workflow_run.head_branch }}
          SHA_SHORT=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${SHA_SHORT}" >> $GITHUB_OUTPUT
          if [ "${BRANCH}" = "master" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Check out deployment files
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Docker login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull images
        run: |
          REG=${{ env.REGISTRY }}
          IMG_BASE=${{ env.IMAGE_NAME }}
          BR=${{ steps.env.outputs.branch }}
          SH=${{ steps.env.outputs.sha }}
          echo "Pulling images for ${BR}-${SH}"
          docker pull ${REG}/${IMG_BASE}-backend:${BR}-${SH}-rserver
          docker pull ${REG}/${IMG_BASE}-frontend:${BR}-${SH}-rserver

      - name: Restart compose stack
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.env.outputs.branch }}-${{ steps.env.outputs.sha }}-rserver
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.env.outputs.branch }}-${{ steps.env.outputs.sha }}-rserver
        run: |
          echo "Stopping existing compose stack (if any)"
          docker compose --project-name gocanopy -f docker-compose.prod.yml down || true
          for PORT in 8000 5173; do
            CONTAINERS=$(docker ps -q --filter "publish=${PORT}" || true)
            if [ -n "${CONTAINERS}" ]; then
              echo "Removing existing container(s) publishing port ${PORT}"
              docker rm -f ${CONTAINERS}
            fi
          done
          echo "Starting compose stack with rserver images"
          docker compose --project-name gocanopy -f docker-compose.prod.yml up -d

      - name: Verify deployment
        env:
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ steps.env.outputs.branch }}-${{ steps.env.outputs.sha }}-rserver
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.env.outputs.branch }}-${{ steps.env.outputs.sha }}-rserver
        run: |
          docker compose --project-name gocanopy -f docker-compose.prod.yml ps

  staging-e2e:
    name: Verify Staging With Playwright
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.workflow_run.head_branch == 'develop' && needs.deploy.outputs.environment == 'staging' }}
    env:
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}

    steps:
      - name: Check out tested revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate staging URL
        run: |
          if [ -z "${STAGING_BASE_URL}" ]; then
            echo "STAGING_BASE_URL GitHub Actions variable is not set"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run staging Playwright suite
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
